---
# tasks file for roles/php
- name: 安装软件包
  yum:
    name:
      - php
      - php-fpm
      - php-mysqlnd
    state: present

- name: 推送配置
  template:
    src: www.conf.j2
    dest: /etc/php-fpm.d/www.conf
  notify: restart php-fpm

- name: 启动php-fpm
  systemd:
    name: php-fpm
    state: started
    enabled: yes
